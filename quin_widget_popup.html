<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quin · 新功能弹窗</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F0EDE6;
  --dk:#1C1A2E;--mid:#6B6680;--lt:#A09CB0;
  --gold:#C09050;--cb:#FBF8F2;--cbr:#E4DDD0;
  --yes:#3FA876;--no:#CC5858;--maybe:#7E62B8;
}
body{
  background:var(--bg);
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
  padding:40px 20px;
  box-sizing:border-box;
}

/* Sheet */
.sheet{
  width:100%;max-width:390px;
  margin:0 auto;
  background:#FAFAF8;
  border-radius:20px;
  padding:0 0 32px;
  position:relative;
}
.sheet-handle{
  width:36px;height:4px;border-radius:2px;
  background:rgba(28,26,46,.12);
  margin:12px auto 0;
}
.sheet-close{
  position:absolute;top:14px;right:18px;
  width:30px;height:30px;border-radius:50%;
  background:rgba(28,26,46,.07);
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--mid);font-size:14px;
}

/* Header */
.sheet-header{
  display:flex;align-items:center;gap:10px;
  padding:14px 20px 0;
}
.app-icon{
  width:38px;height:38px;border-radius:9px;
  background:linear-gradient(135deg,#2A1F5C,#6B4FA0);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.app-name{
  font-family:'Cormorant Garamond',serif;
  font-size:17px;font-weight:600;color:var(--dk);
  letter-spacing:.06em;
}

/* Title area */
.sheet-title-wrap{
  padding:22px 24px 4px;
  text-align:center;
}
.sheet-title{
  font-family:'Cormorant Garamond',serif;
  font-size:26px;font-weight:600;color:var(--dk);
  line-height:1.25;margin-bottom:8px;
  letter-spacing:.01em;
}
.sheet-sub{
  font-size:14px;color:var(--mid);line-height:1.6;
}

.demo-wrap{
  margin:22px 0 0;
  padding:0 20px;
  display:flex;align-items:center;justify-content:center;
}
.slideshow{
  width:100%;position:relative;
  border-radius:16px;overflow:hidden;
}.slide{display:none}
.slide.on{display:block}
.slide img{width:100%;display:block;border-radius:16px}
/* icons */
.d-icons{
  position:absolute;top:16px;left:0;right:0;
  display:flex;gap:10px;justify-content:center;
}
.d-ic{width:40px;height:40px;border-radius:10px;background:rgba(255,255,255,.1)}

/* Widget */
.d-widget{
  position:absolute;top:68px;left:14px;right:14px;
  height:88px;background:#fff;border-radius:14px;
  overflow:hidden;
}
.dws{position:absolute;inset:0;display:none}
.dws.on{display:flex;align-items:center}

/* s0 */
#dws0 .dwt{padding-left:12px;width:105px;display:flex;flex-direction:column;gap:4px}
#dws0 .dwt-t{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;color:var(--dk);line-height:1}
#dws0 .dwt-s{font-size:7px;color:var(--mid);line-height:1.5}
#dws0 .dw-deck{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:44px;height:66px}
.ddc{position:absolute;width:40px;height:62px;border-radius:5px;background:linear-gradient(155deg,#22203A,#16142C);border:1px solid #2E2B4A}
.ddc::before{content:'';position:absolute;inset:4px;border:1px solid rgba(192,144,80,.25);border-radius:3px}
.ddc1{transform:rotate(-5deg) translate(-2px,2px)}
.ddc2{transform:rotate(-1deg)}
.ddc3{transform:rotate(4deg) translate(2px,0)}

/* s1 — 3 cards spread */
#dws1{position:relative;background:#fff}
.dfc{
  position:absolute;width:44px;height:70px;border-radius:5px;
  background:linear-gradient(155deg,#22203A,#16142C);border:1px solid #2E2B4A;
  overflow:hidden;top:9px;left:123px;
  transition:left .4s cubic-bezier(.22,1,.36,1),opacity .3s,transform .3s;
}
.dfc::before{content:'';position:absolute;inset:4px;border:1px solid rgba(192,144,80,.22);border-radius:3px}
.dfc-face{position:absolute;inset:0;border-radius:5px;background:var(--cb);border:1px solid var(--cbr);opacity:0;display:flex;align-items:center;justify-content:center}
.d-hint{position:absolute;bottom:7px;left:0;right:0;text-align:center;font-size:7px;color:var(--mid);opacity:0;transition:opacity .3s}

/* s2 — done */
#dws2 .dw-lb{position:absolute;top:6px;left:11px;font-family:'Cormorant Garamond',serif;font-size:7px;color:var(--lt);letter-spacing:.06em;opacity:0;transition:opacity .3s}
#dws2 .dw-l{position:absolute;left:11px;top:0;bottom:0;width:155px;display:flex;flex-direction:column;justify-content:center;align-items:flex-start;gap:3px}
#dws2 .dw-ans{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:600;line-height:.9;opacity:0;transition:opacity .8s}
#dws2 .dw-ans.yes{color:var(--yes)}
#dws2 .dw-tl{font-family:'Cormorant Garamond',serif;font-size:8px;font-style:italic;color:var(--mid);line-height:1.4;opacity:0;transition:opacity .6s .3s}
#dws2 .dw-btn{display:inline-flex;width:fit-content;padding:3px 8px;border-radius:12px;font-size:7px;font-weight:500;border:none;color:#fff;background:var(--yes);opacity:0;transition:opacity .5s;margin-top:2px;font-family:'DM Sans',sans-serif;flex-shrink:0}
#dws2 .dw-r{position:absolute;right:10px;top:0;bottom:0;width:52px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
#dws2 .dw-card{width:36px;height:56px;border-radius:5px;background:var(--cb);border:1px solid var(--cbr);display:flex;align-items:center;justify-content:center;overflow:hidden;opacity:0;transition:opacity .4s}
#dws2 .dw-nm{font-size:6px;color:var(--lt);opacity:0;transition:opacity .3s}

/* Dock */
.d-dock{
  position:absolute;bottom:10px;left:10px;right:10px;height:44px;
  background:rgba(255,255,255,.14);border-radius:14px;
  display:flex;align-items:center;justify-content:space-around;padding:0 8px;
}
.d-di{width:28px;height:28px;border-radius:8px;background:rgba(255,255,255,.14)}
.d-di.q{background:linear-gradient(135deg,#6B4FA0,#3B2D8A);display:flex;align-items:center;justify-content:center}

/* Tap cursor */
.tap-cursor{
  position:absolute;width:22px;height:22px;border-radius:50%;
  background:rgba(255,255,255,.35);border:1.5px solid rgba(255,255,255,.7);
  pointer-events:none;opacity:0;
  transition:opacity .2s,left .35s cubic-bezier(.22,1,.36,1),top .35s cubic-bezier(.22,1,.36,1);
  transform:translate(-50%,-50%);
}

/* Step dots */
.demo-dots{
  display:flex;justify-content:center;gap:6px;
  margin:16px 0 0;
}
.ddot{width:5px;height:5px;border-radius:50%;background:rgba(28,26,46,.12);transition:background .3s,transform .3s}
.ddot.on{background:var(--gold);transform:scale(1.3)}

/* CTA */
.sheet-cta{
  margin:22px 20px 0;
  display:flex;flex-direction:column;gap:10px;
}
.cta-primary{
  width:100%;padding:16px;
  background:var(--dk);border:none;border-radius:16px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;color:#fff;
  letter-spacing:.02em;transition:opacity .15s;
}
.cta-primary:hover{opacity:.88}
.cta-primary svg{width:18px;height:18px}
.cta-secondary{
  width:100%;padding:10px;
  background:none;border:none;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:13px;color:var(--lt);
}

/* shimmer */
.shim::after{content:'';position:absolute;inset:0;background:linear-gradient(105deg,transparent 30%,rgba(255,255,255,.55) 50%,transparent 70%);animation:shim .22s ease-in-out forwards;border-radius:inherit}
@keyframes shim{0%{transform:translateX(-100%)}100%{transform:translateX(140%)}}
</style>
</head>

<script>
const DOTS=[0,1,2,3].map(i=>document.getElementById(`dd${i}`));
const SLIDES=document.querySelectorAll('.slide');
let cur=0;

function goSlide(n){
  SLIDES[cur].classList.remove('on');
  DOTS[cur].classList.remove('on');
  cur=n;
  SLIDES[cur].classList.add('on');
  DOTS[cur].classList.add('on');
}

// Auto advance
setInterval(()=>goSlide((cur+1)%SLIDES.length),2200);

// Tap dots to jump
DOTS.forEach((d,i)=>d.addEventListener('click',()=>goSlide(i)));
</script>
