<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quin · Widget · iOS 近似方案</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F2EEE7;
  --widget-bg: #FFFFFF;
  --text-dark: #1C1A2E;
  --text-mid: #6B6680;
  --text-light: #A09CB0;
  --gold: #C09050;
  --card-bg: #FBF8F2;
  --card-border: #E4DDD0;
  --yes: #3FA876;
  --no: #CC5858;
  --maybe: #7E62B8;
  --shadow: 0 14px 44px rgba(28,26,46,.15), 0 2px 8px rgba(28,26,46,.07);
  --radius: 22px;
}

body {
  background: var(--bg);
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-family: 'DM Sans', sans-serif;
  gap: 24px; padding: 48px 24px;
}

.pg-header { text-align: center; }
.pg-title { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:600; color:var(--text-dark); letter-spacing:.04em; }
.pg-sub { font-size:11px; color:var(--text-light); letter-spacing:.12em; text-transform:uppercase; margin-top:4px; }

.platform-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 14px; border-radius: 20px;
  background: rgba(0,0,0,.06);
  font-size: 11px; font-weight: 600; color: var(--text-mid);
  letter-spacing: .04em; margin-bottom: 4px;
}
.platform-badge .dot { width: 7px; height: 7px; border-radius: 50%; background: #1C1A2E; }

.diff-note {
  max-width: 329px;
  background: rgba(192,144,80,.08);
  border: 1px solid rgba(192,144,80,.2);
  border-radius: 12px;
  padding: 11px 16px;
  font-size: 11px; color: var(--text-mid); line-height: 1.7;
}
.diff-note strong { color: var(--gold); font-weight: 600; }

/* ══ WIDGET ══ */
.widget {
  width: 329px; height: 155px;
  background: var(--widget-bg);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  position: relative; overflow: hidden;
  cursor: pointer; user-select: none;
}
.widget:active { transform: scale(.985); }

/* ── Init text ── */
#init-text {
  position:absolute; left:22px; top:0; bottom:0; width:158px;
  display:flex; flex-direction:column; justify-content:center; gap:8px;
  transition: transform .32s cubic-bezier(.4,0,1,1), opacity .32s ease;
  will-change: transform, opacity;
}
.init-title { font-family:'Cormorant Garamond',serif; font-size:28px; font-weight:600; color:var(--text-dark); line-height:1; }
.init-sub   { font-size:10.5px; color:var(--text-mid); line-height:1.65; font-weight:300; }

/* ── Fan ── */
#fan-wrap {
  position:absolute; right:10px; top:0; bottom:0; width:152px;
  display:flex; align-items:center; justify-content:center;
  transition: opacity .42s ease;
  will-change: opacity;
}
.card-fan { position:relative; width:90px; height:118px; }
.fan-card {
  position:absolute; width:55px; height:86px; border-radius:7px;
  background:var(--card-bg); border:1px solid var(--card-border);
  transform-origin:50% 100%; left:50%; bottom:2px; margin-left:-27.5px;
  box-shadow:0 2px 8px rgba(28,26,46,.08); overflow:hidden;
}
.fan-card::after {
  content:''; position:absolute; inset:5px;
  border:1px solid var(--card-border); border-radius:4px;
  background:
    repeating-linear-gradient(45deg,transparent,transparent 3px,rgba(192,144,80,.06) 3px,rgba(192,144,80,.06) 4px),
    repeating-linear-gradient(-45deg,transparent,transparent 3px,rgba(192,144,80,.04) 3px,rgba(192,144,80,.04) 4px);
}
.fc1{transform:rotate(-24deg);z-index:1} .fc2{transform:rotate(-12deg);z-index:2}
.fc3{transform:rotate(0deg);z-index:3}   .fc4{transform:rotate(12deg);z-index:2}
.fc5{transform:rotate(24deg);z-index:1}
.pulse {
  position:absolute; bottom:-4px; left:50%; transform:translateX(-50%);
  width:64px; height:12px; border-radius:50%;
  background:radial-gradient(ellipse,rgba(192,144,80,.22) 0%,transparent 70%);
  animation:pulse 2.4s ease-in-out infinite;
}
@keyframes pulse {
  0%,100%{opacity:.35;transform:translateX(-50%) scaleX(1)}
  50%{opacity:1;transform:translateX(-50%) scaleX(1.3)}
}

/* ── Traveling card ── */
#card-wrap {
  position:absolute; width:62px; height:98px;
  left:209px; top:22px; display:none; z-index:25;
}
@keyframes pullUp {
  0%   { transform: translateY(0) scale(0.92); opacity:0; }
  40%  { transform: translateY(-14px) scale(1.04); opacity:1; }
  75%  { transform: translateY(3px) scale(0.99); opacity:1; }
  100% { transform: translateY(0) scale(1); opacity:1; }
}
#card-wrap.pull-up { animation: pullUp .68s cubic-bezier(.22,1,.36,1) both; }
#card-wrap.sliding { transition: left .78s cubic-bezier(.34,1.04,.64,1); }

@keyframes mysticalVanish {
  0%   { transform:scale(1) rotate(0deg); opacity:1; }
  18%  { transform:scale(1.09) rotate(2.5deg) translateY(-3px); opacity:1; }
  100% { transform:scale(0.06) rotate(-10deg) translateY(8px); opacity:0; }
}
#card-wrap.vanishing { animation: mysticalVanish .52s cubic-bezier(.4,0,.8,.5) both; }

#card-glow {
  position:absolute; inset:-10px; border-radius:16px;
  pointer-events:none; z-index:0; opacity:0;
  box-shadow:0 0 22px 7px rgba(192,144,80,.5);
  transition: opacity .25s;
}
#card-glow.on { opacity:1; }

/* ══════════════════════════════════════
   2D FLIP SIMULATION (iOS substitute)
   
   Phase A: scaleX 1 → 0  (card "turns away", back face visible)
            simultaneously a shimmer sweeps across
   Phase B: content swap happens at scaleX=0
   Phase C: scaleX 0 → 1  (card "turns toward", front face visible)
   
   SwiftUI equivalent:
     .transition(.asymmetric(
       insertion: .modifier(active: ScaleX(0), identity: ScaleX(1)),
       removal:   .modifier(active: ScaleX(0), identity: ScaleX(1))
     ))
     combined with a ZStack content swap at the midpoint
══════════════════════════════════════ */
.card-face {
  position:absolute; inset:0; border-radius:8px;
  background:var(--card-bg); border:1px solid var(--card-border);
  box-shadow:0 5px 16px rgba(28,26,46,.12);
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
  transform-origin: center center;
}

/* Shimmer sweep overlay */
.card-face::after {
  content:'';
  position:absolute; inset:0;
  background: linear-gradient(105deg,
    transparent 30%,
    rgba(255,255,255,.55) 50%,
    transparent 70%);
  transform: translateX(-100%);
  opacity: 0;
  pointer-events: none;
}
.card-face.shimmer::after {
  animation: shimmerSweep .35s ease-in-out forwards;
}
@keyframes shimmerSweep {
  0%   { transform:translateX(-100%); opacity:1; }
  100% { transform:translateX(140%); opacity:0; }
}

/* card-back pattern */
#c-back::before {
  content:''; position:absolute; inset:5px;
  border:1px solid var(--card-border); border-radius:4px;
  background:
    repeating-linear-gradient(45deg,transparent,transparent 3px,rgba(192,144,80,.07) 3px,rgba(192,144,80,.07) 4px),
    repeating-linear-gradient(-45deg,transparent,transparent 3px,rgba(192,144,80,.05) 3px,rgba(192,144,80,.05) 4px);
}

/* iOS scaleX crush animation */
@keyframes crushOut {
  0%   { transform: scaleX(1); }
  100% { transform: scaleX(0); }
}
@keyframes expandIn {
  0%   { transform: scaleX(0); }
  100% { transform: scaleX(1); }
}
.crushing { animation: crushOut .22s cubic-bezier(.4,0,1,1) forwards; }
.expanding { animation: expandIn .28s cubic-bezier(0,.85,.45,1) forwards; }

/* Loading on card */
#card-load {
  position:absolute; inset:0; border-radius:8px;
  background:rgba(251,248,242,.88);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:5px;
  opacity:0; transition:opacity .22s; pointer-events:none; z-index:10;
}
#card-load.on { opacity:1; }
.cl-spinner { width:20px; height:20px; animation:spin 1.2s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.cl-text { font-size:7.5px; color:var(--text-light); letter-spacing:.04em; }

/* ── Card name ── */
#card-name-label {
  position:absolute; top:124px; width:62px; text-align:center;
  font-size:9px; color:var(--text-light); line-height:1.4;
  opacity:0; pointer-events:none; transition:opacity .38s ease; z-index:25;
}

/* ── Result left ── */
#result-left {
  position:absolute; left:18px; top:0; bottom:0; width:196px;
  display:flex; flex-direction:column; justify-content:center; gap:7px;
  opacity:0; pointer-events:none; z-index:15;
}
.res-mini { font-family:'Cormorant Garamond',serif; font-size:10.5px; color:var(--text-light); letter-spacing:.06em; opacity:0; transition:opacity .3s ease; }
.res-answer {
  font-family:'Cormorant Garamond',serif; font-size:62px; font-weight:600; line-height:.92;
  opacity:0; transition:opacity 1.1s cubic-bezier(.4,0,.2,1);
}
.res-answer.yes{color:var(--yes)} .res-answer.no{color:var(--no)} .res-answer.maybe{color:var(--maybe)}
.res-cta {
  display:inline-flex; align-items:center; gap:4px;
  padding:6px 14px; border-radius:24px; font-size:11px; font-weight:500;
  border:none; cursor:pointer; width:fit-content; color:white;
  font-family:'DM Sans',sans-serif;
  opacity:0; transition:opacity .5s ease, transform .1s;
}
.res-cta:active { transform:scale(.96); opacity:.85; }
.res-cta.yes{background:var(--yes)} .res-cta.no{background:var(--no)} .res-cta.maybe{background:var(--maybe)}

/* Reset */
#reset-btn {
  position:absolute; top:10px; right:10px;
  width:26px; height:26px; border-radius:50%;
  background:rgba(160,156,176,.12); border:none; cursor:pointer; z-index:30;
  display:flex; align-items:center; justify-content:center;
  font-size:14px; color:var(--text-mid);
  opacity:0; pointer-events:none; transition:opacity .3s, background .15s;
}
#reset-btn:hover { background:rgba(160,156,176,.22); }

/* Fan reform */
@keyframes spreadIn {
  from { transform:rotate(var(--r)) scale(0.1) translateY(12px); opacity:0; }
  60%  { opacity:1; }
  to   { transform:rotate(var(--r)) scale(1) translateY(0); opacity:1; }
}
.fc1{--r:-24deg} .fc2{--r:-12deg} .fc3{--r:0deg} .fc4{--r:12deg} .fc5{--r:24deg}
.fan-card.spread-in { animation:spreadIn .5s cubic-bezier(.34,1.3,.64,1) both; }

/* Controls */
.controls { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
.cb {
  padding:7px 16px; border-radius:24px; border:1.5px solid #D6D0C8;
  background:transparent; font-size:12px; color:var(--text-mid);
  cursor:pointer; font-family:'DM Sans',sans-serif; transition:all .15s;
}
.cb:hover:not(.on){border-color:var(--text-dark);color:var(--text-dark)}
.cb.on{background:var(--text-dark);color:#fff;border-color:var(--text-dark)}
.hint { font-size:11px; color:var(--text-light); text-align:center; max-width:329px; line-height:1.7; }
</style>
</head>
<body>

<div class="pg-header">
  <div class="platform-badge"><div class="dot"></div>iOS WidgetKit 近似方案</div>
  <div class="pg-title">Quin · Yes or No?</div>
  <div class="pg-sub">3D flip → 2D scaleX 压缩模拟</div>
</div>

<div class="widget" id="widget">
  <div id="init-text">
    <div class="init-title">Yes or No?</div>
    <div class="init-sub">默念心中之问<br>轻触牌轮，聆听命运</div>
  </div>
  <div id="fan-wrap">
    <div class="card-fan">
      <div class="fan-card fc1"></div><div class="fan-card fc2"></div>
      <div class="fan-card fc3"></div><div class="fan-card fc4"></div>
      <div class="fan-card fc5"></div><div class="pulse"></div>
    </div>
  </div>
  <div id="card-wrap">
    <div id="card-glow"></div>
    <!-- Back face (always present) -->
    <div class="card-face" id="c-back">
      <svg width="28" height="36" viewBox="0 0 28 36" fill="none">
        <circle cx="14" cy="14" r="9"  stroke="#C09050" stroke-width=".9" opacity=".35"/>
        <circle cx="14" cy="14" r="5"  stroke="#C09050" stroke-width=".9" opacity=".22"/>
        <line x1="14" y1="3"  x2="14" y2="25" stroke="#C09050" stroke-width=".7" opacity=".18"/>
        <line x1="3"  y1="14" x2="25" y2="14" stroke="#C09050" stroke-width=".7" opacity=".18"/>
        <line x1="7"  y1="7"  x2="21" y2="21" stroke="#C09050" stroke-width=".7" opacity=".18"/>
        <line x1="21" y1="7"  x2="7"  y2="21" stroke="#C09050" stroke-width=".7" opacity=".18"/>
        <circle cx="14" cy="14" r="1.8" fill="#C09050" opacity=".28"/>
      </svg>
    </div>
    <!-- Front face (hidden until flip) -->
    <div class="card-face" id="c-front" style="opacity:0;"></div>
    <div id="card-load">
      <svg class="cl-spinner" viewBox="0 0 20 20" fill="none">
        <circle cx="10" cy="10" r="8" stroke="#E4DDD0" stroke-width="2"/>
        <path d="M10 2 A8 8 0 0 1 18 10" stroke="#C09050" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <div class="cl-text">能量感应中</div>
    </div>
  </div>
  <div id="card-name-label"></div>
  <div id="result-left">
    <div class="res-mini" id="res-mini">Yes or No?</div>
    <div class="res-answer" id="res-answer"></div>
    <button class="res-cta" id="res-cta" onclick="event.stopPropagation()">展开来看</button>
  </div>
  <button id="reset-btn" onclick="event.stopPropagation();doReset()">↺</button>
</div>

<div class="diff-note">
  <strong>与原版唯一区别：</strong>翻牌动画<br>
  原版：CSS rotateY 3D 透视翻转（WidgetKit 不支持）<br>
  iOS 实现：scaleX 压缩至 0 → 换内容 → 弹性展开，配合高光扫过模拟翻面质感<br>
  SwiftUI 对应：<code style="font-size:10px;color:var(--gold)">withAnimation(.spring(response:0.5))</code> + ZStack content swap
</div>

<div class="controls">
  <button class="cb on" id="cb-initial" onclick="jumpTo('initial',this)">初始态</button>
  <button class="cb" id="cb-loading" onclick="jumpTo('loading',this)">Loading</button>
  <button class="cb" id="cb-yes"     onclick="jumpTo('yes',this)">完成 · Yes</button>
  <button class="cb" id="cb-no"      onclick="jumpTo('no',this)">完成 · No</button>
  <button class="cb" id="cb-maybe"   onclick="jumpTo('maybe',this)">完成 · Maybe</button>
</div>
<p class="hint">点击小组件体验完整 iOS 近似动画流程</p>

<script>
const delay = ms => new Promise(r => setTimeout(r, ms));
const $ = id => document.getElementById(id);

const POS_CENTER = 134;
const POS_RIGHT  = 224;
const CARD_TOP   = 22;

const CARDS = {
  yes:   { name:'星星 · 正位', cls:'yes',   art: starSVG   },
  no:    { name:'塔 · 逆位',   cls:'no',    art: towerSVG  },
  maybe: { name:'月亮 · 正位', cls:'maybe', art: moonSVG   },
};

function starSVG(w,h){return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" fill="none"><circle cx="${w/2}" cy="${h*.42}" r="${w*.3}" stroke="#C09050" stroke-width="1.2"/><line x1="${w/2}" y1="${h*.08}" x2="${w/2}" y2="${h*.76}" stroke="#C09050" stroke-width=".8" opacity=".35"/><line x1="${w*.08}" y1="${h*.42}" x2="${w*.92}" y2="${h*.42}" stroke="#C09050" stroke-width=".8" opacity=".35"/><line x1="${w*.2}" y1="${h*.2}" x2="${w*.8}" y2="${h*.64}" stroke="#C09050" stroke-width=".8" opacity=".35"/><line x1="${w*.8}" y1="${h*.2}" x2="${w*.2}" y2="${h*.64}" stroke="#C09050" stroke-width=".8" opacity=".35"/><circle cx="${w/2}" cy="${h*.42}" r="${w*.1}" fill="#C09050" opacity=".12"/><circle cx="${w/2}" cy="${h*.42}" r="${w*.06}" fill="#C09050" opacity=".55"/><circle cx="${w/2}" cy="${h*.42}" r="${w*.025}" fill="#C09050"/><text x="${w/2}" y="${h*.88}" text-anchor="middle" font-size="${w*.13}" fill="#A09CB0" font-family="DM Sans,sans-serif" letter-spacing=".06em">THE STAR</text></svg>`;}
function towerSVG(w,h){return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" fill="none"><rect x="${w*.28}" y="${h*.16}" width="${w*.44}" height="${h*.4}" rx="1.5" stroke="#C09050" stroke-width="1.2"/><polygon points="${w*.28},${h*.16} ${w*.5},${h*.05} ${w*.72},${h*.16}" stroke="#C09050" stroke-width="1.2" fill="none"/><line x1="${w*.35}" y1="${h*.27}" x2="${w*.65}" y2="${h*.27}" stroke="#C09050" stroke-width=".8" opacity=".5"/><line x1="${w*.35}" y1="${h*.36}" x2="${w*.65}" y2="${h*.36}" stroke="#C09050" stroke-width=".8" opacity=".5"/><rect x="${w*.38}" y="${h*.46}" width="${w*.24}" height="${h*.1}" rx="1" stroke="#C09050" stroke-width=".9"/><text x="${w/2}" y="${h*.88}" text-anchor="middle" font-size="${w*.13}" fill="#A09CB0" font-family="DM Sans,sans-serif" letter-spacing=".06em">THE TOWER</text></svg>`;}
function moonSVG(w,h){return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" fill="none"><path d="M${w*.6} ${h*.08} A${w*.32} ${w*.32} 0 1 0 ${w*.6} ${h*.72} A${w*.19} ${w*.19} 0 1 1 ${w*.6} ${h*.08}Z" stroke="#C09050" stroke-width="1.2" fill="none"/><circle cx="${w*.28}" cy="${h*.65}" r="${w*.065}" stroke="#C09050" stroke-width=".9" fill="none"/><circle cx="${w*.48}" cy="${h*.71}" r="${w*.048}" stroke="#C09050" stroke-width=".9" fill="none"/><text x="${w/2}" y="${h*.88}" text-anchor="middle" font-size="${w*.13}" fill="#A09CB0" font-family="DM Sans,sans-serif" letter-spacing=".06em">THE MOON</text></svg>`;}

let currentState = 'initial', busy = false;
const widget=_('widget'), initText=_('init-text'), fanWrap=_('fan-wrap');
const cardWrap=_('card-wrap'), cBack=_('c-back'), cFront=_('c-front');
const cardLoad=_('card-load'), cardGlow=_('card-glow'), cardNameLbl=_('card-name-label');
const resultLeft=_('result-left'), resMini=_('res-mini'), resAnswer=_('res-answer');
const resCta=_('res-cta'), resetBtn=_('reset-btn');
function _(id){ return document.getElementById(id); }

widget.addEventListener('click', () => {
  if (currentState !== 'initial' || busy) return;
  const picks = ['yes','no','maybe'];
  runReveal(picks[Math.floor(Math.random()*3)]);
});

async function run2DFlip(frontHTML) {
  // Phase A: crush back face to scaleX=0 + shimmer
  cBack.classList.add('shimmer');
  cBack.classList.add('crushing');

  await delay(220); // crush completes

  // Swap: hide back, populate + show front (at scaleX=0 — invisible)
  cBack.style.opacity = '0';
  cBack.classList.remove('crushing','shimmer');
  cFront.innerHTML = frontHTML;
  cFront.style.opacity = '1';
  cFront.style.transform = 'scaleX(0)';

  void cFront.offsetHeight;

  // Phase C: expand front face back out with spring feel
  cFront.classList.add('expanding');
  cFront.classList.add('shimmer');

  await delay(300); // expand + shimmer completes
  cFront.classList.remove('expanding','shimmer');
  cFront.style.transform = '';
}

async function runReveal(result) {
  busy = true; currentState = 'animating';
  const card = CARDS[result];

  initText.style.transform = 'translateX(-36px)';
  initText.style.opacity = '0';

  await delay(100);
  fanWrap.style.opacity = '0';
  await delay(120);

  cardWrap.style.left = '212px';
  cardWrap.style.top = CARD_TOP + 'px';
  cardWrap.style.display = 'block';
  cardWrap.className = '';
  cBack.style.opacity = '1';
  cBack.style.transform = '';
  cFront.style.opacity = '0';
  cFront.innerHTML = '';

  void cardWrap.offsetHeight;
  cardWrap.classList.add('pull-up');

  await delay(700);
  cardWrap.classList.remove('pull-up');
  initText.style.display = 'none';
  fanWrap.style.display = 'none';

  cardWrap.classList.add('sliding');
  cardWrap.style.left = POS_CENTER + 'px';
  await delay(140);

  currentState = 'loading';
  cardLoad.classList.add('on');
  await delay(820);
  cardLoad.classList.remove('on');
  await delay(160);

  // ── 2D flip simulation (iOS substitute) ──
  await run2DFlip(card.art(46, 72));

  await delay(860);

  // slide to right
  cardWrap.style.left = POS_RIGHT + 'px';
  cardNameLbl.style.left = POS_RIGHT + 'px';
  await delay(340);

  cardNameLbl.textContent = card.name;
  cardNameLbl.style.opacity = '1';

  resAnswer.textContent = result === 'yes' ? 'Yes' : result === 'no' ? 'No' : 'Maybe';
  resAnswer.className = 'res-answer ' + card.cls;
  resCta.className = 'res-cta ' + card.cls;
  resultLeft.style.opacity = '1';
  resultLeft.style.pointerEvents = 'all';

  await delay(160);
  resMini.style.opacity = '1';
  await delay(340);
  resAnswer.style.opacity = '1';
  await delay(1300);
  resCta.style.opacity = '1';
  resetBtn.style.opacity = '1';
  resetBtn.style.pointerEvents = 'all';

  busy = false; currentState = 'done';
}

async function doReset() {
  if (busy || currentState !== 'done') return;
  busy = true; currentState = 'resetting';

  resCta.style.opacity = '0'; resAnswer.style.opacity = '0';
  resMini.style.opacity = '0'; resultLeft.style.opacity = '0';
  resultLeft.style.pointerEvents = 'none';
  resetBtn.style.opacity = '0'; resetBtn.style.pointerEvents = 'none';
  cardNameLbl.style.opacity = '0';
  await delay(220);

  // Reverse 2D flip: crush front → swap to back → expand
  cFront.classList.add('crushing');
  await delay(220);
  cFront.style.opacity = '0'; cFront.classList.remove('crushing');
  cBack.style.opacity = '1'; cBack.style.transform = 'scaleX(0)';
  void cBack.offsetHeight;
  cBack.classList.add('expanding');
  await delay(300);
  cBack.classList.remove('expanding'); cBack.style.transform = '';

  cardGlow.classList.add('on');
  await delay(320);
  cardGlow.classList.remove('on');
  await delay(80);

  cardWrap.classList.remove('sliding');
  cardWrap.classList.add('vanishing');
  await delay(240);

  fanWrap.style.display = 'flex'; fanWrap.style.opacity = '1';
  const fanCards = fanWrap.querySelectorAll('.fan-card');
  const spreadDelays = [160,80,0,80,160];
  fanCards.forEach((fc,i) => {
    fc.style.animation='none'; void fc.offsetHeight;
    fc.style.animationDelay=spreadDelays[i]+'ms';
    fc.classList.add('spread-in');
    setTimeout(()=>fc.classList.remove('spread-in'),800+spreadDelays[i]);
  });
  await delay(300);
  cardWrap.style.display = 'none'; cardWrap.classList.remove('vanishing');
  await delay(200);

  initText.style.display = 'flex'; initText.style.opacity = '0';
  initText.style.transform = 'translateX(-24px)';
  void initText.offsetHeight;
  initText.style.transition = 'transform .38s cubic-bezier(.22,1,.36,1), opacity .38s ease';
  initText.style.transform = 'translateX(0)'; initText.style.opacity = '1';
  await delay(420);
  initText.style.transition = 'transform .32s cubic-bezier(.4,0,1,1), opacity .32s ease';

  busy = false; currentState = 'initial'; updateCBs('initial');
}

function jumpTo(state, btn) {
  if (busy) return;
  resetAllLayers();
  const card = (state!=='initial'&&state!=='loading') ? CARDS[state] : null;
  if (state === 'loading') {
    initText.style.display='none'; fanWrap.style.display='none';
    cardWrap.style.display='block'; cardWrap.style.left=POS_CENTER+'px';
    cardLoad.classList.add('on');
  } else if (card) {
    initText.style.display='none'; fanWrap.style.display='none';
    cBack.style.opacity='0'; cFront.innerHTML=card.art(46,72); cFront.style.opacity='1';
    cardWrap.style.display='block'; cardWrap.style.left=POS_RIGHT+'px';
    cardNameLbl.style.left=POS_RIGHT+'px'; cardNameLbl.textContent=card.name; cardNameLbl.style.opacity='1';
    resAnswer.textContent=state==='yes'?'Yes':state==='no'?'No':'Maybe';
    resAnswer.className='res-answer '+card.cls; resCta.className='res-cta '+card.cls;
    resultLeft.style.opacity='1'; resultLeft.style.pointerEvents='all';
    resMini.style.opacity='1'; resAnswer.style.opacity='1'; resCta.style.opacity='1';
    resetBtn.style.opacity='1'; resetBtn.style.pointerEvents='all';
    currentState='done';
  }
  updateCBs(state);
}

function resetAllLayers() {
  initText.style.cssText='position:absolute;left:22px;top:0;bottom:0;width:158px;display:flex;flex-direction:column;justify-content:center;gap:8px;transition:transform .32s cubic-bezier(.4,0,1,1),opacity .32s ease;will-change:transform,opacity';
  fanWrap.style.cssText='position:absolute;right:10px;top:0;bottom:0;width:152px;display:flex;align-items:center;justify-content:center;transition:opacity .42s ease;will-change:opacity';
  fanWrap.querySelectorAll('.fan-card').forEach(fc=>{fc.style.animation='';fc.classList.remove('spread-in');});
  cardWrap.style.cssText='position:absolute;width:62px;height:98px;left:212px;top:'+CARD_TOP+'px;display:none;z-index:25';
  cardWrap.className='';
  cBack.style.cssText='position:absolute;inset:0;border-radius:8px;background:var(--card-bg);border:1px solid var(--card-border);box-shadow:0 5px 16px rgba(28,26,46,.12);display:flex;align-items:center;justify-content:center;overflow:hidden;transform-origin:center center;opacity:1';
  cFront.style.cssText='position:absolute;inset:0;border-radius:8px;background:var(--card-bg);border:1px solid var(--card-border);box-shadow:0 5px 16px rgba(28,26,46,.12);display:flex;align-items:center;justify-content:center;overflow:hidden;transform-origin:center center;opacity:0';
  cFront.innerHTML=''; cFront.className='card-face';
  cardLoad.classList.remove('on'); cardGlow.classList.remove('on');
  cardNameLbl.style.cssText='position:absolute;top:124px;width:62px;text-align:center;font-size:9px;color:var(--text-light);line-height:1.4;opacity:0;pointer-events:none;transition:opacity .38s ease;z-index:25';
  resultLeft.style.cssText='position:absolute;left:18px;top:0;bottom:0;width:196px;display:flex;flex-direction:column;justify-content:center;gap:7px;opacity:0;pointer-events:none;z-index:15';
  resMini.style.opacity='0'; resAnswer.style.opacity='0'; resCta.style.opacity='0';
  resetBtn.style.cssText='position:absolute;top:10px;right:10px;width:26px;height:26px;border-radius:50%;background:rgba(160,156,176,.12);border:none;cursor:pointer;z-index:30;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text-mid);opacity:0;pointer-events:none;transition:opacity .3s,background .15s';
  currentState='initial';
}

function updateCBs(state) {
  document.querySelectorAll('.cb').forEach(b=>b.classList.remove('on'));
  const m={initial:'cb-initial',loading:'cb-loading',yes:'cb-yes',no:'cb-no',maybe:'cb-maybe'};
  if(m[state])$(m[state]).classList.add('on');
}
</script>
</body>
</html>
